<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-eval'; worker-src blob: 'self'; img-src 'self' blob: data:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com"
    />
    <meta name="description" content="Free browser-based image resizer. Resize, crop, and convert images to JPG, PNG, or WebP — no upload required." />
    <meta property="og:title" content="Image Resizer" />
    <meta property="og:description" content="Resize and convert images in your browser. No server, no upload." />
    <meta property="og:type" content="website" />
    <title>ImageResizer Pro</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Manrope:wght@400;500;600&display=swap" rel="stylesheet" />
    <script>
      (function () {
        try {
          var saved = localStorage.getItem("irp_theme_v1");
          var shouldDark = saved ? saved === "dark" : window.matchMedia("(prefers-color-scheme: dark)").matches;
          if (shouldDark) document.documentElement.classList.add("dark");
        } catch (e) {
          // no-op
        }
      })();
    </script>
  </head>
  <body class="bg-background text-on-background font-body antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
